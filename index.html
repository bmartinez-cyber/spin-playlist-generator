<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spin Playlist Generator</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #2d0052 50%, #1a0033 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(135deg, #ff1493 0%, #da70d6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b0b0b0;
            font-size: 1.2rem;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 2rem;
            }
        }

        .card {
            background: rgba(50, 20, 80, 0.6);
            border: 2px solid rgba(255, 20, 147, 0.3);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .card h2 {
            color: #ff69b4;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e0e0e0;
        }

        input[type="text"],
        input[type="number"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: rgba(20, 10, 40, 0.8);
            border: 2px solid #ff1493;
            border-radius: 8px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #da70d6;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff1493 0%, #da70d6 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 20, 147, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            background: rgba(220, 50, 50, 0.3);
            border-left: 5px solid #dc3232;
            padding: 15px;
            border-radius: 8px;
            color: #ff9999;
            margin-bottom: 15px;
        }

        .success {
            background: rgba(50, 150, 50, 0.3);
            border-left: 5px solid #32dc32;
            padding: 15px;
            border-radius: 8px;
            color: #99ff99;
            margin-bottom: 15px;
        }

        .song-item {
            background: rgba(30, 15, 50, 0.8);
            border-left: 5px solid #ff1493;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .song-title {
            font-weight: 600;
            margin-bottom: 5px;
        }

        .song-artist {
            color: #b0b0b0;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .song-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #d0d0d0;
            margin-bottom: 10px;
        }

        .bpm {
            color: #ff69b4;
            font-weight: bold;
        }

        .soundcloud-link {
            display: inline-block;
            padding: 8px 15px;
            background: rgba(255, 20, 147, 0.2);
            border: 1px solid #ff1493;
            border-radius: 5px;
            color: #ff69b4;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .soundcloud-link:hover {
            background: rgba(255, 20, 147, 0.4);
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #ff69b4;
        }

        .spinner {
            border: 3px solid rgba(255, 20, 147, 0.3);
            border-top: 3px solid #ff1493;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .api-note {
            font-size: 0.85rem;
            color: #b0b0b0;
            margin-top: 10px;
        }

        a {
            color: #ff69b4;
        }

        .playlist-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .copy-btn {
            padding: 8px 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [apiKey, setApiKey] = useState('');
            const [artist, setArtist] = useState('');
            const [theme, setTheme] = useState('');
            const [startBpm, setStartBpm] = useState(90);
            const [songCount, setSongCount] = useState(8);
            const [songs, setSongs] = useState([]);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [success, setSuccess] = useState('');

            const generatePlaylist = async () => {
                setError('');
                setSuccess('');

                if (!apiKey) {
                    setError('⚠️ Please enter your Anthropic API key');
                    return;
                }
                if (!artist) {
                    setError('⚠️ Please enter an artist name');
                    return;
                }
                if (!theme) {
                    setError('⚠️ Please enter a theme name');
                    return;
                }

                setLoading(true);

                try {
                    const response = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': apiKey,
                            'anthropic-version': '2023-06-01'
                        },
                        body: JSON.stringify({
                            model: 'claude-opus-4-6',
                            max_tokens: 1024,
                            messages: [{
                                role: 'user',
                                content: `You are a hip-hop music expert for spin instructors. Generate exactly ${songCount} songs by or featuring ${artist} for a spin class themed "${theme}".

Start at ${startBpm} BPM and increase by ~10 BPM for each song.

Format your response EXACTLY like this, one song per line, no extra text:
SONG_NAME | ARTIST | BPM | ENERGY_LEVEL

Use these energy levels in order: warm-up, building, peak, cool-down

Now generate the ${songCount} songs:`
                            }]
                        })
                    });

                    const data = await response.json();

                    if (!response.ok) {
                        throw new Error(data.error?.message || 'Failed to generate playlist');
                    }

                    const content = data.content[0]?.text || '';
                    const parsedSongs = content.split('\n')
                        .filter(line => line.trim() && line.includes('|'))
                        .map((line, i) => {
                            const parts = line.split('|').map(p => p.trim());
                            return {
                                name: parts[0] || `Song ${i + 1}`,
                                artist: parts[1] || artist,
                                bpm: parseInt(parts[2]) || (startBpm + i * 10),
                                energy: parts[3] || 'building'
                            };
                        });

                    setSongs(parsedSongs);
                    setSuccess('✅ Playlist generated! 🔥');
                } catch (err) {
                    setError(`❌ Error: ${err.message}`);
                }

                setLoading(false);
            };

            const copySongs = () => {
                if (songs.length === 0) return;
                const text = songs
                    .map((s, i) => `${i + 1}. ${s.name} - ${s.artist} (${s.bpm} BPM - ${s.energy})`)
                    .join('\n');
                navigator.clipboard.writeText(text).then(() => {
                    alert('Playlist copied to clipboard! 🔥');
                });
            };

            return (
                <div className="container">
                    <header>
                        <h1>🔥 SPIN PLAYLIST GENERATOR</h1>
                        <p className="subtitle">Create fire hip-hop playlists with perfect BPM progression</p>
                    </header>

                    <div className="main-content">
                        <div className="card">
                            <h2>✨ Create Your Playlist</h2>

                            {error && <div className="error">{error}</div>}
                            {success && <div className="success">{success}</div>}

                            <div className="form-group" style={{ background: 'rgba(30, 15, 50, 0.8)', padding: '15px', borderRadius: '8px', border: '2px solid #ff1493' }}>
                                <label>Anthropic API Key</label>
                                <input
                                    type="password"
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="sk-ant-api03-..."
                                />
                                <div className="api-note">
                                    Get free key at <a href="https://console.anthropic.com" target="_blank" rel="noopener noreferrer">console.anthropic.com</a>
                                </div>
                            </div>

                            <div className="form-group">
                                <label>Artist Name</label>
                                <input
                                    type="text"
                                    value={artist}
                                    onChange={(e) => setArtist(e.target.value)}
                                    placeholder="e.g., Drake, Pitbull, Travis Scott"
                                />
                            </div>

                            <div className="form-group">
                                <label>Theme Name</label>
                                <input
                                    type="text"
                                    value={theme}
                                    onChange={(e) => setTheme(e.target.value)}
                                    placeholder="e.g., Drake Takeover, Pitbull Party"
                                />
                            </div>

                            <div className="input-row">
                                <div className="form-group">
                                    <label>Starting BPM</label>
                                    <input
                                        type="number"
                                        value={startBpm}
                                        onChange={(e) => setStartBpm(parseInt(e.target.value))}
                                        min="60"
                                        max="180"
                                    />
                                </div>
                                <div className="form-group">
                                    <label># of Songs</label>
                                    <input
                                        type="number"
                                        value={songCount}
                                        onChange={(e) => setSongCount(parseInt(e.target.value))}
                                        min="3"
                                        max="15"
                                    />
                                </div>
                            </div>

                            <button onClick={generatePlaylist} disabled={loading}>
                                {loading ? '⏳ Generating...' : '🎵 GENERATE PLAYLIST'}
                            </button>
                        </div>

                        <div className="card">
                            <h2>📋 Your Playlist</h2>

                            {songs.length === 0 ? (
                                <p style={{ color: '#b0b0b0', textAlign: 'center', padding: '40px 20px' }}>
                                    Enter your artist name and click generate to create a fire playlist! 🔥
                                </p>
                            ) : (
                                <div>
                                    <div style={{ marginBottom: '20px' }}>
                                        <h3 style={{ color: '#ff69b4', marginBottom: '10px' }}>{theme}</h3>
                                        <p style={{ color: '#b0b0b0', fontSize: '0.9rem', marginBottom: '15px' }}>
                                            Generated {songs.length} songs with BPM progression
                                        </p>
                                    </div>

                                    <div className="playlist-container">
                                        {songs.map((song, i) => (
                                            <div key={i} className="song-item">
                                                <div className="song-title">
                                                    <span style={{ color: '#ff69b4' }}>{i + 1}.</span> {song.name}
                                                </div>
                                                <div className="song-artist">{song.artist}</div>
                                                <div className="song-meta">
                                                    <span className="bpm">🎯 {song.bpm} BPM</span>
                                                    <span style={{ color: '#da70d6' }}>⚡ {song.energy}</span>
                                                </div>
                                                <a
                                                    href={`https://soundcloud.com/search?q=${encodeURIComponent(song.name + ' ' + song.artist)}`}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="soundcloud-link"
                                                >
                                                    🎧 Find on SoundCloud
                                                </a>
                                            </div>
                                        ))}
                                    </div>

                                    <button className="copy-btn" onClick={copySongs}>
                                        📋 Copy All Songs
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
